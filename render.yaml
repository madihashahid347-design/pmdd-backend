services:
  - type: web
    name: pmdd-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://mock.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: mock_key
